name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install xmllint
        run: |
          sudo apt-get update
          sudo apt-get install -y libxml2-utils

      - name: JS syntax check (every script in js/)
        run: |
          for f in js/*.js; do
            echo "checking $f"
            node --check "$f"
          done

      - name: SVG well-formedness (banner + QR)
        run: |
          xmllint --noout banner.svg
          xmllint --noout qr.svg

      - name: Format-writer round-trip
        run: node tests/roundtrip.js
